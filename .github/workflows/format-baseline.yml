name: format-baseline

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to format (default: main)
        required: false
        default: main

permissions:
  contents: write
  pull-requests: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore dotforge.sln --use-lock-file

      - name: Apply formatting
        run: dotnet format dotforge.sln --no-restore

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(format): apply dotnet format baseline"
          title: "chore(format): apply dotnet format baseline"
          body: |
            Automated formatting baseline generated by `dotnet format`.
            Review and merge this PR to re-enable blocking format checks in CI.
          branch: chore/format-baseline
          delete-branch: true
